model:
  d_model: 512
  num_layers: 4
  num_experts: 8
  top_k: 2
  num_butterfly_layers: null  # defaults to log2(d)

training:
  num_epochs: 20
  lr: 1.0e-3
  weight_decay: 0.1
  load_balance_weight: 0.01
  max_steps: 500
  batch_size: 32
  seq_len: 128
  patience: 3

data:
  dataset_name: "wikitext-103"
  vocab_size: 50257  # GPT-2 tokenizer
